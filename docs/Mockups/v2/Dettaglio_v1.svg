<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1100" viewBox="0 0 1440 1100" role="img" aria-labelledby="title desc">
  <title id="title">RicercaCasa - Mockup pagina dettaglio V1</title>
  <desc id="desc">Mockup desktop della pagina dettaglio locale con dati immobile, fonti collegate, stato, note e appuntamento.</desc>
  <defs>
    <radialGradient id="pageGlow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#f8fbff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <linearGradient id="photoWall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8efe6"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="windowLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .font { font-family: "Avenir Next", "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 31px; font-weight: 750; fill: #0f172a; letter-spacing: -0.8px; }
      .h2 { font-size: 22px; font-weight: 750; fill: #0f172a; letter-spacing: -0.35px; }
      .h3 { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 14px; fill: #64748b; }
      .small { font-size: 12px; fill: #64748b; }
      .label { font-size: 11px; font-weight: 700; fill: #94a3b8; letter-spacing: 1.5px; }
      .buttonText { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="1100" fill="url(#pageGlow)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1440" height="74" fill="#ffffff"/>
  <line x1="0" y1="74" x2="1440" y2="74" stroke="#e2e8f0"/>
  <g class="font">
    <text x="72" y="47" font-size="29" font-weight="800" fill="#0f172a" letter-spacing="-1">Ricerca</text>
    <text x="181" y="47" font-size="29" font-weight="800" fill="#2563eb" letter-spacing="-1">Casa</text>

    <rect x="1134" y="18" width="112" height="38" rx="19" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="1157" cy="37" r="7" fill="none" stroke="#64748b" stroke-width="2"/>
    <line x1="1162" y1="42" x2="1168" y2="48" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <text x="1177" y="42" class="small" font-weight="700" fill="#475569">Ricerca</text>

    <rect x="1257" y="18" width="116" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
    <path d="M1281 42s-9-5.4-9-12.2a5.2 5.2 0 0 1 9-3.5 5.2 5.2 0 0 1 9 3.5c0 6.8-9 12.2-9 12.2z" fill="none" stroke="#2563eb" stroke-width="2"/>
    <text x="1298" y="42" class="small" font-weight="700" fill="#2563eb">Preferiti</text>
  </g>

  <!-- Back -->
  <g class="font">
    <rect x="72" y="102" width="174" height="44" rx="15" fill="#ffffff" stroke="#e2e8f0"/>
    <path d="M96 124h12m-12 0 5-5m-5 5 5 5" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="118" y="129" class="small" font-weight="700" fill="#475569">Torna ai preferiti</text>
  </g>

  <!-- Main gallery card -->
  <rect x="72" y="166" width="780" height="432" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <g transform="translate(92 186)">
    <rect width="740" height="316" rx="22" fill="url(#photoWall)"/>
    <!-- stylized apartment image -->
    <rect x="0" y="0" width="740" height="316" rx="22" fill="#f5eee7"/>
    <rect x="416" y="26" width="270" height="202" rx="8" fill="#ffffff" stroke="#d6d3d1" stroke-width="3"/>
    <rect x="431" y="41" width="114" height="172" fill="url(#windowLight)"/>
    <rect x="558" y="41" width="113" height="172" fill="url(#windowLight)"/>
    <line x1="488" y1="41" x2="488" y2="213" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="614" y1="41" x2="614" y2="213" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="431" y1="126" x2="671" y2="126" stroke="#cbd5e1" stroke-width="3"/>
    <path d="M0 232 L740 202 L740 316 L0 316 Z" fill="#d6b894"/>
    <path d="M0 261 L740 226" stroke="#c49a6c" stroke-width="2" opacity="0.45"/>
    <path d="M0 292 L740 251" stroke="#c49a6c" stroke-width="2" opacity="0.45"/>
    <rect x="54" y="151" width="294" height="102" rx="26" fill="#e7e5e4" stroke="#d6d3d1"/>
    <rect x="77" y="132" width="121" height="52" rx="20" fill="#fafaf9"/>
    <rect x="205" y="132" width="121" height="52" rx="20" fill="#fafaf9"/>
    <rect x="92" y="245" width="12" height="35" rx="4" fill="#78716c"/>
    <rect x="300" y="245" width="12" height="35" rx="4" fill="#78716c"/>
    <ellipse cx="385" cy="244" rx="86" ry="27" fill="#a16207" opacity="0.72"/>
    <rect x="378" y="245" width="12" height="44" rx="4" fill="#78350f"/>
    <rect x="340" y="82" width="34" height="133" rx="16" fill="#365314"/>
    <circle cx="357" cy="78" r="31" fill="#65a30d"/>
    <circle cx="334" cy="102" r="25" fill="#4d7c0f"/>
    <circle cx="381" cy="108" r="28" fill="#84cc16"/>
    <rect x="32" y="34" width="190" height="92" rx="8" fill="#fefce8" stroke="#d6d3d1" stroke-width="3"/>
    <path d="M53 105 97 65l36 27 28-21 40 34" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
    <circle cx="166" cy="58" r="13" fill="#fde68a"/>
    <rect x="0" y="0" width="740" height="316" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.7"/>
  </g>

  <!-- thumbnails -->
  <g transform="translate(92 518)">
    <rect width="128" height="60" rx="14" fill="#e7e5e4" stroke="#2563eb" stroke-width="3"/>
    <rect x="142" width="128" height="60" rx="14" fill="#f1f5f9" stroke="#e2e8f0"/>
    <rect x="284" width="128" height="60" rx="14" fill="#e2e8f0" stroke="#e2e8f0"/>
    <rect x="426" width="128" height="60" rx="14" fill="#f5f5f4" stroke="#e2e8f0"/>
    <rect x="568" width="128" height="60" rx="14" fill="#eff6ff" stroke="#e2e8f0"/>
    <text x="632" y="36" class="font small" text-anchor="middle" font-weight="700" fill="#475569">+ 12 foto</text>
  </g>

  <!-- Summary card -->
  <rect x="878" y="166" width="490" height="432" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <g class="font">
    <rect x="906" y="194" width="72" height="28" rx="14" fill="#dbeafe"/>
    <text x="942" y="213" class="small" text-anchor="middle" font-weight="800" fill="#2563eb">VENDITA</text>

    <rect x="988" y="194" width="103" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="1039" y="213" class="small" text-anchor="middle" font-weight="700" fill="#64748b">Immobiliare.it</text>

    <text x="906" y="263" class="h1">Trilocale luminoso</text>
    <text x="906" y="300" class="h1">con terrazzo</text>

    <path d="M914 327a8 8 0 1 1 16 0c0 7-8 14-8 14s-8-7-8-14z" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="922" cy="327" r="2.5" fill="#64748b"/>
    <text x="942" y="335" class="body">Senigallia, Centro</text>

    <text x="906" y="386" font-size="34" font-weight="800" fill="#2563eb" letter-spacing="-1">€ 248.000</text>

    <g transform="translate(906 416)">
      <rect width="122" height="42" rx="13" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="61" y="26" class="small" text-anchor="middle" font-weight="700" fill="#475569">3 locali</text>
      <rect x="132" width="122" height="42" rx="13" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="193" y="26" class="small" text-anchor="middle" font-weight="700" fill="#475569">78 m²</text>
      <rect x="264" width="122" height="42" rx="13" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="325" y="26" class="small" text-anchor="middle" font-weight="700" fill="#475569">2° piano</text>
    </g>

    <rect x="906" y="480" width="206" height="52" rx="16" fill="#2563eb"/>
    <text x="1009" y="512" class="buttonText" text-anchor="middle" fill="#ffffff">Apri fonte</text>
    <path d="M1074 500h12v12m0-12-16 16" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1124" y="480" width="216" height="52" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1232" y="512" class="buttonText" text-anchor="middle" fill="#475569">Elimina dai preferiti</text>

    <line x1="906" y1="554" x2="1340" y2="554" stroke="#e2e8f0"/>
    <text x="906" y="579" class="label">FONTI COLLEGATE</text>
    <text x="1050" y="579" class="small" font-weight="700" fill="#475569">Immobiliare.it</text>
    <circle cx="1155" cy="575" r="2.5" fill="#94a3b8"/>
    <text x="1170" y="579" class="small" font-weight="700" fill="#475569">Idealista</text>
  </g>

  <!-- Description and facts -->
  <rect x="72" y="626" width="780" height="400" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#softShadow)"/>
  <g class="font">
    <text x="104" y="674" class="h2">Dettagli dell’immobile</text>
    <text x="104" y="708" class="body">Appartamento luminoso al secondo piano, in una zona centrale e ben servita.</text>
    <text x="104" y="733" class="body">Il soggiorno si apre su un terrazzo abitabile; cucina separata, due camere e bagno.</text>
    <text x="104" y="758" class="body">I dati sono quelli salvati localmente dalla fonte selezionata.</text>

    <line x1="104" y1="790" x2="820" y2="790" stroke="#e2e8f0"/>
    <text x="104" y="828" class="label">CARATTERISTICHE</text>

    <g transform="translate(104 850)">
      <rect width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="18" y="24" class="small">Tipologia</text>
      <text x="18" y="46" class="h3">Appartamento</text>

      <rect x="230" width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="248" y="24" class="small">Stato</text>
      <text x="248" y="46" class="h3">Buono</text>

      <rect x="460" width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="478" y="24" class="small">Riscaldamento</text>
      <text x="478" y="46" class="h3">Autonomo</text>

      <rect y="78" width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="18" y="102" class="small">Bagni</text>
      <text x="18" y="124" class="h3">1</text>

      <rect x="230" y="78" width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="248" y="102" class="small">Ascensore</text>
      <text x="248" y="124" class="h3">Sì</text>

      <rect x="460" y="78" width="214" height="62" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="478" y="102" class="small">Classe energetica</text>
      <text x="478" y="124" class="h3">D</text>
    </g>
  </g>

  <!-- Management panel -->
  <rect x="878" y="626" width="490" height="400" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#softShadow)"/>
  <g class="font">
    <text x="906" y="674" class="h2">Gestione annuncio</text>

    <text x="906" y="708" class="label">STATO</text>
    <rect x="906" y="722" width="434" height="48" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="930" cy="746" r="7" fill="#2563eb"/>
    <text x="948" y="751" class="body" font-weight="700" fill="#334155">Visita programmata</text>
    <path d="m1315 741 7 7 7-7" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="906" y="806" class="label">PROSSIMO APPUNTAMENTO</text>
    <rect x="906" y="820" width="434" height="76" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="922" y="836" width="44" height="44" rx="12" fill="#2563eb"/>
    <text x="944" y="854" class="small" text-anchor="middle" font-weight="800" fill="#ffffff">18</text>
    <text x="944" y="869" font-size="9" text-anchor="middle" font-weight="800" fill="#dbeafe">LUG</text>
    <text x="982" y="849" class="h3">Sabato, ore 10:30</text>
    <text x="982" y="873" class="small">Visita presso l’immobile</text>
    <text x="1309" y="860" class="small" text-anchor="end" font-weight="700" fill="#2563eb">Modifica</text>

    <text x="906" y="930" class="label">NOTE</text>
    <rect x="906" y="944" width="326" height="56" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="924" y="969" class="small">Verificare spese condominiali e stato infissi…</text>
    <text x="924" y="988" font-size="10" fill="#94a3b8">Nota locale, non inviata al portale</text>
    <rect x="1244" y="944" width="96" height="56" rx="14" fill="#2563eb"/>
    <text x="1292" y="978" class="buttonText" text-anchor="middle" fill="#ffffff">Salva</text>
  </g>

  <g class="font">
    <text x="720" y="1068" class="small" text-anchor="middle">Mockup Dettaglio V1 · RicercaCasa V2 · dati e azioni locali</text>
  </g>
</svg>
