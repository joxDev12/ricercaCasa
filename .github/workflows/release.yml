name: release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ricercacasa
          POSTGRES_USER: ricercacasa
          POSTGRES_PASSWORD: ricercacasa
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ricercacasa -d ricercacasa"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: ricercacasa
      DB_USER: ricercacasa
      DB_PASS: ricercacasa
      APP_SECRET: release-test-secret
      SETUP_TOKEN: release-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npm run db:migrate && npm run db:status
        working-directory: backend
      - run: npm ci && npm run lint && npm run build
        working-directory: ricercaCasa
      - run: node --test updater/tests/*.test.js
      - run: bash -n deployment/install.release.sh deployment/test-release-install-smoke.sh
      - run: SMOKE_TEST_CONFIRM=1 ./deployment/test-install-smoke.sh

  publish:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
      updater_digest: ${{ steps.updater.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: backend
        with: {context: ./backend, push: true, tags: ghcr.io/joxdev12/ricercacasa-backend:3.0.0}
      - uses: docker/build-push-action@v6
        id: frontend
        with: {context: ./ricercaCasa, push: true, tags: ghcr.io/joxdev12/ricercacasa-frontend:3.0.0}
      - uses: docker/build-push-action@v6
        id: updater
        with: {context: ./updater, push: true, tags: ghcr.io/joxdev12/ricercacasa-updater:1.0.0}

  assets:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir release-assets
          cp deployment/install.release.sh deployment/bootstrap-compose.yaml deployment/compose.release.yaml deployment/release.env.example deployment/manifest.schema.json release-assets/
          mv release-assets/install.release.sh release-assets/install.sh
          mv release-assets/compose.release.yaml release-assets/compose.yaml
          backend_digest='${{ needs.publish.outputs.backend_digest }}'; backend_digest="${backend_digest#sha256:}"
          frontend_digest='${{ needs.publish.outputs.frontend_digest }}'; frontend_digest="${frontend_digest#sha256:}"
          updater_digest='${{ needs.publish.outputs.updater_digest }}'; updater_digest="${updater_digest#sha256:}"
          sed -e 's/__RELEASED_AT__/'"$(date -u +%FT%TZ)"'/' \
            -e "s/__BACKEND_DIGEST__/$backend_digest/" \
            -e "s/__FRONTEND_DIGEST__/$frontend_digest/" \
            -e "s/__UPDATER_DIGEST__/$updater_digest/" \
            deployment/manifest.release.template.json > release-assets/manifest.json
          (cd release-assets && sha256sum install.sh bootstrap-compose.yaml compose.yaml release.env.example manifest.json manifest.schema.json > checksums.txt)
      - uses: actions/upload-artifact@v4
        with: {name: release-assets, path: release-assets}

  smoke_release:
    needs: assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: release-assets, path: release-assets}
      - uses: actions/checkout@v4
      - run: chmod +x deployment/test-release-install-smoke.sh && RELEASE_SMOKE_CONFIRM=1 RELEASE_ASSET_DIR="$GITHUB_WORKSPACE/release-assets" ./deployment/test-release-install-smoke.sh

  release:
    needs: smoke_release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: {name: release-assets, path: release-assets}
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
