services:
  updater:
    image: ghcr.io/joxdev12/ricercacasa-updater:1.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UPDATER_PORT:-8081}:8081"
    environment:
      PORT: 8081
      UPDATER_VERSION: 1.0.0
      PLATFORM_VERSION: 3.0.0
      INSTALLATION_DIR: ${RICERCACASA_HOME:?RICERCACASA_HOME is required}
      SETUP_TOKEN_FILE: ${RICERCACASA_HOME:?RICERCACASA_HOME is required}/secrets/setup_token
      RELEASE_MANIFEST_PATH: ${RICERCACASA_HOME:?RICERCACASA_HOME is required}/manifest.json
      COMPOSE_FILE_PATH: ${RICERCACASA_HOME:?RICERCACASA_HOME is required}/compose.yaml
      RELEASE_ENV_PATH: ${RICERCACASA_HOME:?RICERCACASA_HOME is required}/release.env
      ALLOWED_IMAGE_NAMESPACE: ${ALLOWED_IMAGE_NAMESPACE:-ghcr.io/joxdev12}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-ricercacasa}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      APP_PUBLIC_ORIGIN: http://127.0.0.1:${APP_PORT:-8080}
      BACKEND_INTERNAL_URL: ${BOOTSTRAP_BACKEND_INTERNAL_URL:-http://host.docker.internal:${BACKEND_PORT:-3000}}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${RICERCACASA_HOME:?RICERCACASA_HOME is required}:${RICERCACASA_HOME:?RICERCACASA_HOME is required}
      - /var/run/docker.sock:/var/run/docker.sock
